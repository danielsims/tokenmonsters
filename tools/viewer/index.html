<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GLB Split Viewer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #18181b;
      color: #d4d4d8;
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
      min-height: 100vh;
      overflow-x: auto;
    }

    /* Top bar */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid #27272a;
    }

    #topbar h1 {
      font-size: 14px;
      font-weight: 500;
      color: #a1a1aa;
      letter-spacing: 0.03em;
    }

    #pause-btn, #open-btn {
      background: #27272a;
      color: #a1a1aa;
      border: 1px solid #3f3f46;
      border-radius: 4px;
      padding: 4px 12px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #pause-btn:hover, #open-btn:hover {
      background: #3f3f46;
      color: #e4e4e7;
    }

    #pause-btn .icon {
      font-size: 10px;
    }

    #subtitle {
      text-align: center;
      font-size: 11px;
      color: #52525b;
      padding: 8px 0 12px;
    }

    /* Column headers */
    .tier-headers {
      display: flex;
      justify-content: center;
      gap: 16px;
      padding: 0 16px 8px;
      margin-left: 80px;
    }
    .tier-header {
      width: 320px;
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      color: #71717a;
      padding: 6px 0;
      border-bottom: 1px solid #27272a;
    }

    /* Grid */
    .split-row {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 16px;
      padding: 8px 16px;
    }

    .row-label {
      width: 64px;
      padding-top: 80px;
      font-size: 12px;
      font-weight: 600;
      color: #71717a;
      text-align: right;
      flex-shrink: 0;
    }

    .viewport {
      background: #27272a;
      border: 2px solid #3f3f46;
      border-radius: 6px;
      overflow: hidden;
      width: 320px;
      display: flex;
      flex-direction: column;
      transition: border-color 0.15s;
      cursor: pointer;
    }

    .viewport:hover {
      border-color: #52525b;
    }

    .viewport.selected {
      border-color: #a1a1aa;
      box-shadow: 0 0 8px rgba(161, 161, 170, 0.15);
    }

    .viewport canvas {
      display: block;
      width: 320px;
      height: 240px;
    }

    .viewport-stats {
      padding: 6px 10px;
      font-size: 10px;
      color: #52525b;
      border-top: 1px solid #27272a;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .viewport-stats span {
      white-space: nowrap;
    }

    /* Drop overlay */
    #drop-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(9, 9, 11, 0.92);
      z-index: 100;
      justify-content: center;
      align-items: center;
      font-size: 18px;
      color: #71717a;
      border: 2px dashed #3f3f46;
      margin: 16px;
      border-radius: 8px;
    }

    #drop-overlay.active {
      display: flex;
    }

    #selection-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #18181b;
      border-top: 1px solid #27272a;
      padding: 12px 24px;
      display: none;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      z-index: 50;
    }

    #selection-bar.visible {
      display: flex;
    }

    #selection-bar .info {
      color: #71717a;
    }

    #selection-bar .filename {
      color: #d4d4d8;
      font-weight: 600;
    }

    #selection-bar button {
      background: #fafafa;
      color: #18181b;
      border: none;
      border-radius: 4px;
      padding: 8px 20px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    #selection-bar button:hover {
      background: #e4e4e7;
    }

    #bottom-spacer {
      height: 60px;
    }
  </style>
</head>
<body>
  <div id="topbar">
    <h1>GLB Split Viewer</h1>
    <div style="display:flex;gap:8px;">
      <button id="open-btn">Open Model</button>
      <button id="pause-btn"><span class="icon">||</span> Pause</button>
    </div>
  </div>
  <p id="subtitle">Click a model to select it. Drag + scroll to inspect. Drop GLB files to load custom models.</p>
  <div id="content"></div>
  <div id="bottom-spacer"></div>
  <div id="selection-bar">
    <div class="info">Selected: <span class="filename" id="sel-name"></span> <span id="sel-stats"></span></div>
    <button id="sel-confirm">Confirm Selection</button>
  </div>
  <div id="drop-overlay">Drop GLB files here</div>
  <script type="module" src="/main.js"></script>
</body>
</html>
